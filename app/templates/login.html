<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACE — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    .login-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--color-bg); padding: 20px;
    }
    .login-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 48px 40px;
      width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);
    }
    .login-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 24px; color: #fff; margin: 0 auto 20px;
    }
    .login-title { font-size: 24px; font-weight: 700; color: var(--color-text); margin-bottom: 8px; letter-spacing: 2px; text-align: center; }
    .login-subtitle { font-size: 13px; color: var(--color-text-muted); margin-bottom: 32px; text-align: center; }
    .login-error {
      margin-bottom: 16px; padding: 10px 14px; background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3); border-radius: var(--radius-sm);
      color: var(--color-danger); font-size: 13px;
    }
    .login-footer { margin-top: 32px; font-size: 11px; color: var(--color-text-dim); text-align: center; }
    .email-form { margin-bottom: 0; }
    .email-form input[type="email"] {
      width: 100%; padding: 12px 14px; background: var(--color-bg);
      border: 1px solid var(--color-border); border-radius: var(--radius-sm);
      color: var(--color-text); font-family: var(--font-family); font-size: 14px;
      outline: none; margin-bottom: 12px;
    }
    .email-form input[type="email"]:focus { border-color: var(--color-primary); }
    .email-form button {
      width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
      background: var(--color-primary); color: #fff; font-family: var(--font-family);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .email-form button:hover { background: var(--color-primary-hover); box-shadow: var(--shadow-glow); }
  </style>
</head>
<body style="overflow: auto;">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">P</div>
      <div class="login-title">PACE</div>
      <div class="login-subtitle">Progress And Construction Efficiency</div>

      {% if error %}
      <div class="login-error">⚠️ {{ error }}</div>
      {% endif %}

      <form action="/auth/login" method="POST" class="email-form">
        <input type="email" name="email" placeholder="Enter your email address" value="{{ email or '' }}" required autocomplete="email" autofocus />
        <button type="submit">Sign In</button>
      </form>

      <div class="login-footer">
        PACE v1.0 &copy; 2026
      </div>
    </div>
  </div>

  <script>
    var saved = localStorage.getItem('pace-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
